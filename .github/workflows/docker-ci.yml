name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dockerfile-check:
    name: Build & Test Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env.local
        run: |
          cat << 'EOF' > .env.local
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY=${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          EOF

      - name: Build Dockerfile image
        run: docker build -t real-time-fund .

      - name: Run Dockerfile container
        run: |
          docker run -d --name fund -p 3000:3000 real-time-fund

      - name: Test service (port reachable)
        run: |
          # 只验证服务可连通（避免 basePath/路由 404 误伤）
          for i in {1..30}; do
            if curl -s -o /dev/null -I http://localhost:3000; then
              echo "Server is reachable"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

          echo "Server did not respond in time"
          docker logs fund || true
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop fund || true
          docker rm fund || true


  docker-compose-check:
    name: Build & Test Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env.local
        run: |
          cat << 'EOF' > .env.local
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY=${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
          EOF

      - name: Docker Compose up
        run: |
          docker compose up -d --build

      - name: Test app service (port reachable)
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -I http://localhost:3000; then
              echo "Server is reachable"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

          echo "Server did not respond in time"
          docker compose logs app || true
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down
